<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yadgar Indo-Pak Cuisine | Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #f8f1e9;
    --panel: #ffffff;
    --wine: #52152d;
    --wine-deep: #3c0f21;
    --gold-1: #8a6a2e;
    --gold-2: #d4af6a;
    --gold-3: #f4e2b8;
    --muted: #9c7684;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 12% 6%, rgba(82,21,45,0.05), transparent 45%),
      radial-gradient(circle at 88% 94%, rgba(212,175,106,0.16), transparent 50%),
      var(--bg);
    font-family: 'Cormorant Garamond', 'Georgia', serif;
    color: var(--wine);
    display:flex;
    justify-content:center;
    padding: 44px 20px 60px;
  }

  .wrap{
    width:100%;
    max-width:640px;
  }

  .logo-wrap{
    display:flex;
    justify-content:center;
    margin-bottom: 26px;
  }

  .logo{
    position:relative;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    overflow: hidden;
  }

  .logo img{
    width:100%;
    height:100%;
    object-fit: contain;
    display:block;
  }

  .logo::after{
    content:"";
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background: linear-gradient(115deg, transparent 40%, rgba(255,255,255,0.85) 50%, transparent 60%);
    transform: translateX(-150%);
    opacity: 0;
    animation: shine 3.6s ease-in-out infinite;
    animation-delay: 2s;
    pointer-events:none;
  }

  @keyframes shine{
    0%   { transform: translateX(-150%); opacity: 0; }
    8%   { opacity: 0.9; }
    22%  { transform: translateX(150%); opacity: 0; }
    100% { transform: translateX(150%); opacity: 0; }
  }

  header{
    text-align:center;
    margin-bottom:32px;
  }

  h1{
    font-family: 'Playfair Display', 'Georgia', serif;
    font-size: clamp(30px, 6vw, 42px);
    font-weight: 600;
    margin: 0;
    color: var(--wine);
    letter-spacing: 0.01em;
  }

  .divider{
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-2), transparent);
    margin: 22px auto 0;
  }

  .section-label{
    font-family: 'Playfair Display', serif;
    font-size: 12px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--gold-1);
    margin: 30px 0 12px 4px;
  }

  /* shared premium card */
  a.card, a.catering, a.main-menu{
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background: var(--panel);
    border: 1.5px solid var(--gold-2);
    border-radius: 10px;
    padding: 18px 22px;
    color: var(--wine);
    transition: background 0.35s ease, color 0.35s ease, border-color 0.35s ease, transform 0.2s ease, box-shadow 0.3s ease;
  }

  a.card .day-name, a.catering .day-name{
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 18px;
    letter-spacing: 0.01em;
  }

  a.card .arrow, a.catering .arrow, a.main-menu .arrow{
    font-family: 'Playfair Display', serif;
    color: var(--gold-1);
    font-size: 16px;
    transition: color 0.35s ease;
  }

  a.card:hover, a.card:focus-visible,
  a.catering:hover, a.catering:focus-visible{
    background: var(--wine);
    border-color: var(--gold-2);
    transform: translateY(-3px);
    box-shadow: 0 8px 22px rgba(82,21,45,0.22);
  }

  a.card:hover .day-name, a.card:focus-visible .day-name,
  a.catering:hover .day-name, a.catering:focus-visible .day-name,
  a.catering:hover .tag, a.catering:focus-visible .tag{
    color: var(--gold-3);
  }

  a.card:hover .arrow, a.card:focus-visible .arrow,
  a.catering:hover .arrow, a.catering:focus-visible .arrow{
    color: var(--gold-3);
  }

  a.card:focus-visible, a.catering:focus-visible, a.main-menu:focus-visible{
    outline: 2px solid var(--gold-2);
    outline-offset: 2px;
  }

  .main-menu{
    background: linear-gradient(135deg, var(--wine), var(--wine-deep));
    border: 1.5px solid var(--gold-2);
    padding: 20px 24px;
    margin-bottom: 8px;
  }

  .main-menu .day-name{
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--gold-3);
    letter-spacing: 0.03em;
  }

  .main-menu .arrow{ color: var(--gold-3); }

  .main-menu:hover, .main-menu:focus-visible{
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(82,21,45,0.3);
    border-color: var(--gold-3);
  }

  .days{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .catering{
    margin-top: 4px;
  }

  .catering .day-name{
    font-size: 19px;
    color: var(--wine);
    transition: color 0.35s ease;
  }

  .catering .tag{
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    display:block;
    transition: color 0.35s ease;
  }

  .social{
    margin-top: 42px;
    text-align:center;
  }

  .social-link{
    display:inline-flex;
    align-items:center;
    gap:8px;
    text-decoration:none;
    color: var(--wine);
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    letter-spacing: 0.03em;
    border: 1px solid var(--gold-2);
    border-radius: 999px;
    padding: 10px 20px;
    transition: background 0.25s ease, color 0.25s ease;
  }

  .social-link:hover{
    background: var(--wine);
    color: var(--gold-3);
  }

  .social-link svg{
    width: 16px;
    height: 16px;
    fill: currentColor;
  }

  footer{
    text-align:center;
    margin-top: 30px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.03em;
  }

  @media (max-width: 420px){
    .days{ grid-template-columns: 1fr; }
  }
</style>
</head>
